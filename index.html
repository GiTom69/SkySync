<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkySync — Flight Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── Reset & Variables ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #060a10;
    --bg2:       #0c1420;
    --bg3:       #101c2c;
    --amber:     #f59e0b;
    --amber-dim: #b37209;
    --amber-glow:rgba(245,158,11,0.15);
    --teal:      #00d4aa;
    --red:       #ef4444;
    --green:     #22c55e;
    --text:      #d4c5a9;
    --text-dim:  #6b7a8d;
    --border:    rgba(245,158,11,0.18);
    --border-hi: rgba(245,158,11,0.55);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-head: 'Barlow Condensed', sans-serif;
    --radius:    8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ─────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(245,158,11,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0,212,170,0.03) 0%, transparent 50%),
      linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 48px 48px, 48px 48px;
    pointer-events: none;
  }

  /* ── Layout ─────────────────────────────────────────────────────── */
  .app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    display: flex; align-items: baseline; gap: 12px;
  }
  .logo-mark {
    font-family: var(--font-head);
    font-weight: 900;
    font-size: 2.2rem;
    letter-spacing: 0.12em;
    color: var(--amber);
    text-shadow: 0 0 24px rgba(245,158,11,0.5);
    line-height: 1;
  }
  .logo-sep { color: var(--border-hi); font-size: 1.4rem; }
  .logo-tag {
    font-family: var(--font-head);
    font-weight: 300;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .version-badge {
    font-size: 0.62rem; letter-spacing: 0.1em;
    background: var(--amber-glow); color: var(--amber);
    border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 3px;
    vertical-align: middle; margin-left: 10px;
  }

  .header-actions { display: flex; align-items: center; gap: 12px; }

  /* ── Stats Bar ──────────────────────────────────────────────────── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 36px;
  }
  .stat-block {
    background: var(--bg2);
    padding: 20px 28px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label {
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--font-head); font-weight: 600;
  }
  .stat-value {
    font-family: var(--font-head); font-weight: 700; font-size: 2rem;
    color: var(--amber); line-height: 1;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }

  /* ── Section header ─────────────────────────────────────────────── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: var(--font-head); font-weight: 700; font-size: 1.1rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim);
  }
  .section-title span { color: var(--amber); }

  /* ── Tracker Grid ───────────────────────────────────────────────── */
  .tracker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* ── Tracker Card ───────────────────────────────────────────────── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .card:hover {
    border-color: var(--border-hi);
    box-shadow: 0 0 32px rgba(245,158,11,0.1), 0 4px 16px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover::before { opacity: 1; }

  .card-scanning::after {
    content: '';
    position: absolute; top: 12px; right: 12px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.6); }
  }

  .card-route {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .iata {
    font-family: var(--font-head); font-weight: 900; font-size: 1.5rem;
    color: #fff; letter-spacing: 0.05em;
  }
  .route-arrow {
    color: var(--amber); font-size: 1.1rem;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 16px;
  }

  .price-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 14px;
  }
  .price-main {
    font-family: var(--font-head); font-weight: 700; font-size: 2.4rem;
    color: var(--amber); line-height: 1;
  }
  .price-currency {
    font-size: 1rem; font-weight: 400; margin-right: 2px; color: var(--amber-dim);
  }
  .price-change {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.72rem; font-weight: 600;
    padding: 4px 10px; border-radius: 4px;
  }
  .price-change.down { background: rgba(34,197,94,0.12); color: var(--green); }
  .price-change.up   { background: rgba(239,68,68,0.12);  color: var(--red); }
  .price-change.same { background: rgba(107,122,141,0.12); color: var(--text-dim); }

  .card-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 4px;
  }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .meta-value { font-size: 0.78rem; color: var(--text); }

  .signal-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 4px;
    font-family: var(--font-head); font-weight: 700;
    font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 12px;
  }
  .signal-badge.BUY     { background: rgba(34,197,94,0.12);  color: var(--green);   border: 1px solid rgba(34,197,94,0.3); }
  .signal-badge.WAIT    { background: rgba(239,68,68,0.12);   color: var(--red);     border: 1px solid rgba(239,68,68,0.3); }
  .signal-badge.NEUTRAL { background: rgba(107,122,141,0.12); color: var(--text-dim); border: 1px solid rgba(107,122,141,0.3); }

  .card-actions {
    display: flex; gap: 8px; margin-top: 14px;
  }

  /* ── Buttons ────────────────────────────────────────────────────── */
  .btn {
    font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.08em;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer;
    padding: 6px 14px; border-radius: 4px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--amber); color: var(--amber); }
  .btn-primary {
    background: var(--amber); color: #000; font-weight: 600;
    border-color: var(--amber);
  }
  .btn-primary:hover { background: #fbbf24; color: #000; border-color: #fbbf24; }
  .btn-ghost { border-color: transparent; }
  .btn-ghost:hover { background: var(--amber-glow); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-icon {
    padding: 6px 10px; border-radius: 4px;
  }

  /* ── Empty state ────────────────────────────────────────────────── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 0;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-title { font-family: var(--font-head); font-weight: 700; font-size: 1.3rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .empty-sub { font-size: 0.78rem; }

  /* ── Modal ──────────────────────────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(6,10,16,0.88);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius);
    width: 100%; max-width: 520px; max-height: 90vh;
    overflow-y: auto;
    transform: translateY(16px);
    transition: transform 0.2s;
    box-shadow: 0 0 80px rgba(245,158,11,0.12), 0 24px 64px rgba(0,0,0,0.6);
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 28px 0;
    margin-bottom: 24px;
  }
  .modal-title {
    font-family: var(--font-head); font-weight: 700; font-size: 1.4rem;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber);
  }
  .modal-body { padding: 0 28px 28px; }

  /* ── Form ───────────────────────────────────────────────────────── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  .form-label {
    font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim);
  }
  .form-input, .form-select {
    font-family: var(--font-mono); font-size: 0.82rem;
    background: var(--bg3); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 9px 12px; outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--amber); }
  .form-input::placeholder { color: var(--text-dim); }
  .form-select option { background: var(--bg3); }
  .form-hint { font-size: 0.62rem; color: var(--text-dim); margin-top: 2px; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-top: 1px solid var(--border);
  }
  .toggle-label { font-size: 0.8rem; color: var(--text); }
  .toggle-sub { font-size: 0.62rem; color: var(--text-dim); }
  .toggle {
    width: 40px; height: 22px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 11px;
    position: relative; cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--amber); border-color: var(--amber); }
  .toggle::after {
    content: '';
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--bg); transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); background: #000; }

  .form-actions {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
  }

  /* ── Chart Modal ────────────────────────────────────────────────── */
  .chart-modal {
    max-width: 820px;
  }
  .chart-container {
    position: relative; height: 280px; margin: 16px 0;
    background: var(--bg3); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px;
  }
  .chart-signal-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    background: var(--bg3); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 16px;
  }
  .signal-icon { font-size: 1.8rem; }
  .signal-text { flex: 1; }
  .signal-title {
    font-family: var(--font-head); font-weight: 700; font-size: 1.2rem;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .signal-detail { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
  .confidence-bar {
    width: 100px; height: 6px;
    background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .confidence-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  .price-history-table {
    width: 100%; border-collapse: collapse; font-size: 0.72rem; margin-top: 16px;
  }
  .price-history-table th {
    font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-dim); padding: 6px 8px; text-align: left;
    border-bottom: 1px solid var(--border); font-weight: 500;
  }
  .price-history-table td {
    padding: 8px 8px; border-bottom: 1px solid rgba(245,158,11,0.06);
    vertical-align: middle;
  }
  .price-history-table tr:last-child td { border-bottom: none; }
  .price-history-table tr:hover td { background: var(--amber-glow); }
  .book-link {
    color: var(--amber); text-decoration: none; font-weight: 600;
    font-size: 0.66rem; letter-spacing: 0.08em;
  }
  .book-link:hover { text-decoration: underline; }

  /* ── Loading ────────────────────────────────────────────────────── */
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--amber); border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ──────────────────────────────────────────────────────── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 12px 18px; border-radius: var(--radius);
    font-size: 0.78rem; max-width: 320px;
    animation: toast-in 0.25s ease-out;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red); }
  .toast.info    { border-color: var(--amber);  color: var(--amber); }
  @keyframes toast-in { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform: none; } }

  /* ── Scrollbar ──────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

  /* ── Responsive ─────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .stats-bar { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-mark">SKY<wbr>SYNC</span>
      <span class="logo-sep">|</span>
      <span class="logo-tag">Flight Intelligence<span class="version-badge">v2.0</span></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-icon" id="refreshBtn" title="Refresh all data">⟳ Refresh</button>
      <button class="btn btn-primary" id="newTrackerBtn">+ New Tracker</button>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-block">
      <span class="stat-label">Active Trackers</span>
      <span class="stat-value" id="statTrackers">—</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Total Scans</span>
      <span class="stat-value" id="statScans">—</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Alerts Triggered</span>
      <span class="stat-value green" id="statAlerts">—</span>
    </div>
  </div>

  <!-- Trackers section -->
  <div class="section-header">
    <span class="section-title"><span>◈</span> Active Monitors</span>
    <span style="font-size:0.65rem;color:var(--text-dim);letter-spacing:0.1em;" id="lastRefreshLabel"></span>
  </div>

  <div class="tracker-grid" id="trackerGrid">
    <div class="empty-state">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<!-- ══════════════════════════════════════════════════ New Tracker Modal -->
<div class="overlay" id="newTrackerOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Tracker</span>
      <button class="btn btn-ghost btn-icon" id="closeNewTracker">✕</button>
    </div>
    <div class="modal-body">
      <form id="newTrackerForm">
        <div class="form-grid">

          <div class="form-group full">
            <label class="form-label">Tracker Name</label>
            <input class="form-input" name="name" placeholder="e.g. TLV → Tokyo Summer" required/>
          </div>

          <div class="form-group">
            <label class="form-label">Origin (IATA)</label>
            <input class="form-input" name="origin" placeholder="TLV" maxlength="3" style="text-transform:uppercase" required/>
            <span class="form-hint">3-letter airport code</span>
          </div>
          <div class="form-group">
            <label class="form-label">Destination (IATA)</label>
            <input class="form-input" name="destination" placeholder="NRT" maxlength="3" style="text-transform:uppercase" required/>
          </div>

          <div class="form-group">
            <label class="form-label">Min Trip Length (days)</label>
            <input class="form-input" name="duration_min" type="number" value="7" min="1" max="60" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Max Trip Length (days)</label>
            <input class="form-input" name="duration_max" type="number" value="14" min="1" max="60" required/>
          </div>

          <div class="form-group">
            <label class="form-label">Window Start</label>
            <input class="form-input" name="window_start" type="date" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Window End</label>
            <input class="form-input" name="window_end" type="date" required/>
          </div>

          <div class="form-group">
            <label class="form-label">Target Price (alert)</label>
            <input class="form-input" name="target_price" type="number" placeholder="800" min="1"/>
          </div>
          <div class="form-group">
            <label class="form-label">Scan Interval</label>
            <select class="form-select" name="scan_interval_hours">
              <option value="1">Every 1 hour</option>
              <option value="3">Every 3 hours</option>
              <option value="6" selected>Every 6 hours</option>
              <option value="12">Every 12 hours</option>
              <option value="24">Once daily</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Currency</label>
            <select class="form-select" name="currency">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="ILS">ILS</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Alert Email (optional)</label>
            <input class="form-input" name="alert_email" type="email" placeholder="you@example.com"/>
          </div>

        </div>

        <div class="toggle-row">
          <div>
            <div class="toggle-label">Require Carry-On Included</div>
            <div class="toggle-sub">Exclude bare Basic Economy fares</div>
          </div>
          <div class="toggle" id="baggageToggle" data-on="false"></div>
          <input type="hidden" name="baggage_required" id="baggageInput" value="false"/>
        </div>

        <div class="form-actions">
          <button type="button" class="btn" id="cancelNewTracker">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitNewTracker">Deploy Tracker →</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ Chart/History Modal -->
<div class="overlay" id="chartOverlay">
  <div class="modal chart-modal">
    <div class="modal-header">
      <span class="modal-title" id="chartModalTitle">Price History</span>
      <button class="btn btn-ghost btn-icon" id="closeChart">✕</button>
    </div>
    <div class="modal-body">
      <!-- Signal -->
      <div class="chart-signal-row" id="signalRow">
        <div class="signal-icon" id="signalIcon">◎</div>
        <div class="signal-text">
          <div class="signal-title" id="signalTitle">Analysing…</div>
          <div class="signal-detail" id="signalDetail"></div>
        </div>
        <div>
          <div style="font-size:0.6rem;color:var(--text-dim);margin-bottom:4px;">CONFIDENCE</div>
          <div class="confidence-bar">
            <div class="confidence-fill" id="confidenceFill" style="width:0;background:var(--amber);"></div>
          </div>
          <div style="font-size:0.68rem;color:var(--text-dim);margin-top:3px;text-align:right;" id="confidencePct">—</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>

      <!-- Recent scans table -->
      <div style="font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;">Recent Scans</div>
      <div style="overflow-x:auto;max-height:200px;overflow-y:auto;">
        <table class="price-history-table" id="historyTable">
          <thead>
            <tr>
              <th>Scanned</th>
              <th>Outbound</th>
              <th>Return</th>
              <th>Total</th>
              <th>Baggage</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>

      <div class="form-actions" style="margin-top:16px;">
        <button class="btn btn-ghost btn-danger" id="deleteTrackerBtn">🗑 Delete Tracker</button>
        <button class="btn" id="manualScanBtn">⟳ Scan Now</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════ State */
let trackers = [];
let activeTrackerId = null;
let chartInstance = null;
let pollTimer = null;

/* ═══════════════════════════════════════ Utils */
const fmt = (n, cur = 'USD') => {
  if (n == null) return '—';
  try {
    return new Intl.NumberFormat('en-US', { style:'currency', currency: cur, maximumFractionDigits: 0 }).format(n);
  } catch { return `${cur} ${Number(n).toFixed(0)}`; }
};
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
const fmtTime = iso => iso ? new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Never';

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ═══════════════════════════════════════ API */
async function api(path, opts = {}) {
  const res = await fetch(path, { headers:{'Content-Type':'application/json'}, ...opts });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || res.statusText); }
  if (res.status === 204) return null;
  return res.json();
}

/* ═══════════════════════════════════════ Render */
function renderCard(t) {
  const diff = (t.current_best_price != null && t.previous_best_price != null)
    ? t.current_best_price - t.previous_best_price : null;
  let changeHtml = `<span class="price-change same">—</span>`;
  if (diff !== null) {
    if (diff < -0.5) changeHtml = `<span class="price-change down">▼ ${fmt(Math.abs(diff), t.currency)}</span>`;
    else if (diff > 0.5) changeHtml = `<span class="price-change up">▲ ${fmt(diff, t.currency)}</span>`;
  }

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = t.id;
  card.innerHTML = `
    <div class="card-route">
      <span class="iata">${t.origin}</span>
      <span class="route-arrow">⇆</span>
      <span class="iata">${t.destination}</span>
    </div>
    <div class="card-name">${t.name}</div>
    <div class="price-row">
      <div class="price-main">
        <span class="price-currency">${t.currency}</span>${t.current_best_price != null ? Number(t.current_best_price).toLocaleString('en-US',{maximumFractionDigits:0}) : '—'}
      </div>
      ${changeHtml}
    </div>
    <div class="card-meta">
      <div class="meta-item">
        <span class="meta-label">Duration</span>
        <span class="meta-value">${t.duration_min}–${t.duration_max} days</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Window</span>
        <span class="meta-value">${fmtDate(t.window_start)} → ${fmtDate(t.window_end)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Target</span>
        <span class="meta-value">${t.target_price ? fmt(t.target_price, t.currency) : 'None'}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Last Scan</span>
        <span class="meta-value">${fmtTime(t.last_scanned)}</span>
      </div>
    </div>
    <div class="signal-badge NEUTRAL" id="signal-${t.id}">◎ Loading signal…</div>
  `;
  card.addEventListener('click', () => openChartModal(t.id));
  return card;
}

async function loadTrackers() {
  try {
    trackers = await api('/api/trackers');
    const stats = await api('/api/stats');

    document.getElementById('statTrackers').textContent = stats.active_trackers;
    document.getElementById('statScans').textContent    = stats.total_scans.toLocaleString();
    document.getElementById('statAlerts').textContent   = stats.alerts_triggered;
    document.getElementById('lastRefreshLabel').textContent = 'Updated ' + new Date().toLocaleTimeString();

    const grid = document.getElementById('trackerGrid');
    grid.innerHTML = '';

    if (trackers.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✈</div>
          <div class="empty-title">No Active Trackers</div>
          <div class="empty-sub">Click "New Tracker" to start monitoring flight prices.</div>
        </div>`;
      return;
    }

    trackers.forEach(t => grid.appendChild(renderCard(t)));
    // Load signals concurrently
    trackers.forEach(t => loadSignal(t.id));

  } catch(e) {
    toast('Failed to load trackers: ' + e.message, 'error');
  }
}

async function loadSignal(trackerId) {
  try {
    const data = await api(`/api/trackers/${trackerId}/history`);
    const sig = data.signal;
    const el = document.getElementById(`signal-${trackerId}`);
    if (!el) return;
    const icons = { BUY:'● BUY NOW', WAIT:'◐ WAIT', NEUTRAL:'○ NEUTRAL' };
    el.className = `signal-badge ${sig.signal}`;
    el.textContent = `${icons[sig.signal] || sig.signal}  ${sig.trend !== 'INSUFFICIENT_DATA' ? sig.trend + ' TREND' : 'NEED MORE DATA'}`;
  } catch {}
}

/* ═══════════════════════════════════════ Chart Modal */
async function openChartModal(trackerId) {
  activeTrackerId = trackerId;
  const overlay = document.getElementById('chartOverlay');
  overlay.classList.add('open');

  document.getElementById('chartModalTitle').textContent = 'Loading…';
  document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-dim)"><div class="spinner"></div></td></tr>';

  try {
    const data = await api(`/api/trackers/${trackerId}/history`);
    const t = data.tracker;
    const history = data.history;
    const sig = data.signal;

    document.getElementById('chartModalTitle').textContent = `${t.origin} ⇆ ${t.destination} — ${t.name}`;

    // Signal
    const signalColors = { BUY: 'var(--green)', WAIT: 'var(--red)', NEUTRAL: 'var(--amber)' };
    const signalIcons  = { BUY: '●', WAIT: '◐', NEUTRAL: '○' };
    const signalDescs  = {
      BUY:     `Price is trending ${sig.trend}. Model suggests this may be a local minimum.`,
      WAIT:    `Price is still trending ${sig.trend}. Consider waiting for a lower point.`,
      NEUTRAL: `Price trend is ${sig.trend}. Not enough momentum to make a clear call.`
    };
    document.getElementById('signalIcon').textContent = signalIcons[sig.signal] || '○';
    document.getElementById('signalIcon').style.color = signalColors[sig.signal] || 'var(--amber)';
    document.getElementById('signalTitle').textContent = sig.signal === 'INSUFFICIENT_DATA' ? 'Insufficient Data' : sig.signal + ' SIGNAL';
    document.getElementById('signalTitle').style.color = signalColors[sig.signal] || 'var(--amber)';
    document.getElementById('signalDetail').textContent = signalDescs[sig.signal] || 'Run more scans to build price history.';
    const conf = Math.round((sig.confidence || 0) * 100);
    document.getElementById('confidenceFill').style.width = conf + '%';
    document.getElementById('confidenceFill').style.background = signalColors[sig.signal] || 'var(--amber)';
    document.getElementById('confidencePct').textContent = conf + '%';

    // Chart
    if (chartInstance) chartInstance.destroy();
    const labels = history.map(h => fmtTime(h.timestamp));
    const prices = history.map(h => h.total_price);

    const ctx = document.getElementById('priceChart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Best Total Price',
          data: prices,
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.06)',
          borderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: '#f59e0b',
          pointBorderColor: '#060a10',
          pointBorderWidth: 2,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0c1420',
            borderColor: 'rgba(245,158,11,0.4)',
            borderWidth: 1,
            titleColor: '#f59e0b',
            bodyColor: '#d4c5a9',
            callbacks: {
              label: ctx => ` ${t.currency} ${ctx.parsed.y.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}`,
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(245,158,11,0.05)' },
            ticks: { color: '#6b7a8d', font:{ family:"'IBM Plex Mono'", size:10 }, maxRotation:0, maxTicksLimit:6 }
          },
          y: {
            grid: { color: 'rgba(245,158,11,0.05)' },
            ticks: {
              color: '#6b7a8d', font:{ family:"'IBM Plex Mono'", size:10 },
              callback: v => t.currency + ' ' + v.toLocaleString()
            }
          }
        }
      }
    });

    // Table
    const tbody = document.getElementById('historyTableBody');
    if (history.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:20px;">No scans yet — scan is running in background.</td></tr>';
    } else {
      tbody.innerHTML = [...history].reverse().slice(0, 30).map(h => `
        <tr>
          <td>${fmtTime(h.timestamp)}</td>
          <td>${h.outbound_date ? fmtDate(h.outbound_date) : '—'}</td>
          <td>${h.return_date   ? fmtDate(h.return_date)   : '—'}</td>
          <td style="color:var(--amber);font-weight:600">${fmt(h.total_price, h.currency)}</td>
          <td>${h.baggage_included ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--text-dim)">—</span>'}</td>
          <td>${h.booking_url ? `<a class="book-link" href="${h.booking_url}" target="_blank" rel="noopener">Book →</a>` : '—'}</td>
        </tr>
      `).join('');
    }

  } catch(e) {
    toast('Error loading history: ' + e.message, 'error');
  }
}

/* ═══════════════════════════════════════ New Tracker Form */
const baggageToggle = document.getElementById('baggageToggle');
baggageToggle.addEventListener('click', () => {
  const on = baggageToggle.dataset.on === 'false';
  baggageToggle.dataset.on = String(on);
  baggageToggle.classList.toggle('on', on);
  document.getElementById('baggageInput').value = String(on);
});

document.getElementById('newTrackerBtn').addEventListener('click', () => {
  document.getElementById('newTrackerOverlay').classList.add('open');
});
document.getElementById('closeNewTracker').addEventListener('click', () => {
  document.getElementById('newTrackerOverlay').classList.remove('open');
});
document.getElementById('cancelNewTracker').addEventListener('click', () => {
  document.getElementById('newTrackerOverlay').classList.remove('open');
});
document.getElementById('newTrackerOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

document.getElementById('newTrackerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('submitNewTracker');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Deploying…';

  const fd = new FormData(form);
  const payload = {
    name:               fd.get('name'),
    origin:             fd.get('origin').toUpperCase().trim(),
    destination:        fd.get('destination').toUpperCase().trim(),
    duration_min:       parseInt(fd.get('duration_min')),
    duration_max:       parseInt(fd.get('duration_max')),
    window_start:       fd.get('window_start'),
    window_end:         fd.get('window_end'),
    scan_interval_hours:parseInt(fd.get('scan_interval_hours')),
    currency:           fd.get('currency'),
    baggage_required:   fd.get('baggage_required') === 'true',
    target_price:       fd.get('target_price') ? parseFloat(fd.get('target_price')) : null,
    alert_email:        fd.get('alert_email') || null,
  };

  try {
    await api('/api/trackers', { method:'POST', body: JSON.stringify(payload) });
    toast('Tracker deployed! Initial scan running…', 'success');
    document.getElementById('newTrackerOverlay').classList.remove('open');
    form.reset();
    baggageToggle.dataset.on = 'false';
    baggageToggle.classList.remove('on');
    await loadTrackers();
  } catch(err) {
    toast('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Deploy Tracker →';
  }
});

/* ═══════════════════════════════════════ Chart modal actions */
document.getElementById('closeChart').addEventListener('click', () => {
  document.getElementById('chartOverlay').classList.remove('open');
  activeTrackerId = null;
});
document.getElementById('chartOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) { e.currentTarget.classList.remove('open'); activeTrackerId = null; }
});

document.getElementById('manualScanBtn').addEventListener('click', async () => {
  if (!activeTrackerId) return;
  const btn = document.getElementById('manualScanBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await api(`/api/trackers/${activeTrackerId}/scan`, { method:'POST' });
    toast('Scan started — results in a moment.', 'info');
    setTimeout(() => { if (activeTrackerId) openChartModal(activeTrackerId); }, 3000);
  } catch(e) { toast('Scan error: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⟳ Scan Now'; }
});

document.getElementById('deleteTrackerBtn').addEventListener('click', async () => {
  if (!activeTrackerId) return;
  if (!confirm('Delete this tracker and all its price history?')) return;
  try {
    await api(`/api/trackers/${activeTrackerId}`, { method:'DELETE' });
    toast('Tracker deleted.', 'info');
    document.getElementById('chartOverlay').classList.remove('open');
    activeTrackerId = null;
    await loadTrackers();
  } catch(e) { toast('Delete error: ' + e.message, 'error'); }
});

document.getElementById('refreshBtn').addEventListener('click', loadTrackers);

/* ═══════════════════════════════════════ Init */
loadTrackers();
// Auto-refresh every 60s
setInterval(loadTrackers, 60_000);
</script>
</body>
</html>
